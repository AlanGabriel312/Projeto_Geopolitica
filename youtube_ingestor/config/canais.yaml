# =============================================================================
# Configuracao declarativa da ingestao perene.
# A FREQUENCIA de cada canal e decisao de NEGOCIO, nao de codigo:
# noticia de guerra muda em minutos; review de gadget, em horas.
# Edite este arquivo para adicionar/remover canais sem tocar no codigo.
# =============================================================================

canais:

  - nome: "Geopolitica - Noticias"
    channel_id: "UCvdwhh_fDyWccR42-rReZLw"   # ID Real do canal CNN Brasil
    dominio: "geopolitica"
    intervalo_min: 5          # Mantido o padrão de alta volatilidade
    max_videos_por_ciclo: 20
    vocabulario: ["guerra", "sancao", "conflito", "embargo", "tropas", "fronteira", "acordo"]
    ativo: true

# Parametros globais do ingestor
global:
  idiomas_legenda: ["pt", "pt-BR"] # Focado nos idiomas que funcionaram no seu teste
  # Modo demo: FALSO para consumir os dados reais do YouTube através do 5G/VPS
  modo_demo: false
  janela_descoberta_dias: 30   
